repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.14.13
  hooks:
    # Run the linter.
    - id: ruff
      types_or: [ python, pyi, jupyter ]
    # Run the formatter.
    - id: ruff-format
      types_or: [ python, pyi, jupyter ]

- repo: https://github.com/fastai/nbdev
  rev: 2.4.14
  hooks:
    - id: nbdev_clean
      additional_dependencies:
        - execnb==0.1.18
        - fastcore<2
    - id: nbdev_export
      additional_dependencies:
        - execnb==0.1.18
        - fastcore<2
